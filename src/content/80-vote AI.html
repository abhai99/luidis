<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo 1 Minute  (80-vote AI)</title>
    <style>
        :root { --bg: #050a14; --card: #0f1626; --pri: #3b82f6; --grn: #10b981; --red: #ef4444; --warn: #f59e0b; --mut: #475569; --txt: #f8fafc; --mirage: #ec4899; --neon: #06b6d4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--txt); padding: 15px; max-width: 500px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .header h2 { font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .dot { height: 10px; width: 10px; background: var(--neon); border-radius: 50%; animation: blink 1s infinite; box-shadow: 0 0 10px var(--neon);}
        @keyframes blink { 50% { opacity: 0.3; } }

        .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-action { flex: 1; background: var(--card); border: 1px solid #1e293b; color: var(--mut); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.8rem; text-transform: uppercase;}
        
        .btn-action.active-safe { background: rgba(16,185,129,0.15); border-color: var(--grn); color: var(--grn); }
        .btn-action.active-action { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }
        .btn-action.active-inv { background: rgba(236,72,153,0.15); border-color: var(--mirage); color: var(--mirage); }
        .btn-action.active-norm { background: rgba(6,182,212,0.15); border-color: var(--neon); color: var(--neon); }
        
        .btn-sound { background: var(--card); border: 1px solid var(--mut); color: var(--mut); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem;}
        .btn-sound.on { border-color: var(--grn); color: var(--grn); }

        .timer-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #1e293b; margin-top: 15px; }
        .timer-bar span { font-size: 0.8rem; color: var(--mut); font-weight: bold; text-transform: uppercase; letter-spacing: 1px;}
        .time-text { font-size: 1.6rem; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px rgba(6,182,212,0.5); }

        .matrix-panel { background: var(--card); border-radius: 12px; padding: 20px 15px; text-align: center; border: 2px solid #1e293b; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.3s;}
        .matrix-panel.active-inv { border-color: var(--mirage); box-shadow: 0 0 20px rgba(236,72,153,0.2); background: rgba(236,72,153,0.05); }
        .matrix-panel.active-norm { border-color: var(--neon); box-shadow: 0 0 20px rgba(6,182,212,0.2); background: rgba(6,182,212,0.05); }
        .matrix-panel.wait { border-color: var(--mut); }
        
        .engine-grid { display: grid; grid-template-columns: repeat(17, 1fr); gap: 3px; margin: 15px 0; background: #050a14; padding: 10px; border-radius: 8px; border: 1px solid #1e293b;}
        .engine-led { height: 8px; border-radius: 1px; background: #1e293b; transition: all 0.3s; opacity: 0.2; }
        .led-B { background: var(--warn); box-shadow: 0 0 5px var(--warn); opacity: 1; }
        .led-S { background: var(--pri); box-shadow: 0 0 5px var(--pri); opacity: 1; }
        .led-dead { background: #1e293b; box-shadow: none; opacity: 0.1; } /* Engines with 0 weight */

        .target-label { font-size: 0.75rem; color: var(--mut); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .target-text { font-size: 3rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        
        .Wait { color: var(--mut); font-size: 2.2rem; }
        .Big { color: var(--warn); text-shadow: 0 2px 10px rgba(245,158,11,0.4); }
        .Small { color: var(--pri); text-shadow: 0 2px 10px rgba(59,130,246,0.4); }

        .status-badge { display: inline-block; margin-top: 15px; padding: 6px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; letter-spacing: 1px; }
        .bg-inv { background: rgba(236,72,153,0.1); color: var(--mirage); border: 1px solid var(--mirage); animation: pulse-inv 1s infinite;}
        .bg-norm { background: rgba(6,182,212,0.1); color: var(--neon); border: 1px solid var(--neon); animation: pulse-norm 1s infinite;}
        .bg-wait { background: rgba(71,85,105,0.1); color: var(--mut); border: 1px solid var(--mut); }
        
        @keyframes pulse-inv { 0% { box-shadow: 0 0 0 0 rgba(236,72,153,0.4); } 70% { box-shadow: 0 0 0 10px rgba(236,72,153,0); } 100% { box-shadow: 0 0 0 0 rgba(236,72,153,0); } }
        @keyframes pulse-norm { 0% { box-shadow: 0 0 0 0 rgba(6,182,212,0.4); } 70% { box-shadow: 0 0 0 10px rgba(6,182,212,0); } 100% { box-shadow: 0 0 0 0 rgba(6,182,212,0); } }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #1e293b; position: relative;}
        .stat-box span { display: block; font-size: 1.4rem; font-weight: bold; margin-top: 5px; }
        .stat-box .lbl { font-size: 0.65rem; color: var(--mut); text-transform: uppercase; letter-spacing: 1px;}
        .neural-link { position: absolute; top: 5px; right: 5px; font-size: 0.6rem; color: var(--neon); font-weight: bold; background: rgba(6,182,212,0.1); padding: 2px 4px; border-radius: 4px; border: 1px solid var(--neon);}

        .history-wrap { max-height: 300px; overflow-y: auto; border-radius: 8px; border: 1px solid #1e293b; background: var(--card); }
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .history-table th, .history-table td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #1e293b; }
        .history-table th { color: var(--mut); font-weight: 600; background: #050a14; position: sticky; top: 0; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;}
        
        .b-win { background: rgba(16,185,129,0.1); color: var(--grn); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--grn); font-weight: bold; font-size:0.7rem;}
        .b-loss { background: rgba(239,68,68,0.1); color: var(--red); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--red); font-weight: bold; font-size:0.7rem;}
        .b-skip { color: var(--mut); font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="header">
        <h2><span class="dot"></span> Liquid Neural V6.0</h2>
        <button id="soundBtn" class="btn-sound off" onclick="toggleSound()">🔇 Sound Off</button>
    </div>

    <!-- Toggles -->
    <div class="btn-row">
        <button id="btn-safe" class="btn-action" onclick="setMode(true)">🛡️ SAFE (Skip)</button>
        <button id="btn-action" class="btn-action" onclick="setMode(false)">🚀 ACTION (No Skip)</button>
    </div>
    <div class="btn-row">
        <button id="btn-inv" class="btn-action" onclick="setInverse(true)">⚡ INVERSE ON</button>
        <button id="btn-norm" class="btn-action" onclick="setInverse(false)">✅ INVERSE OFF</button>
    </div>

    <div class="timer-bar">
        <span>Target Issue: <br><strong id="ui-issue" style="color:#fff; font-size:1.1rem;">-----</strong></span>
        <div class="time-text" id="ui-timer">00s</div>
    </div>

    <div class="matrix-panel" id="panel">
        <div class="target-label">Neural Weighted Vote Array</div>
        <div class="engine-grid" id="ui-engines"></div>
        <div class="target-label">Dynamic System Order</div>
        <div id="ui-target" class="target-text Wait">WAITING...</div>
        <div id="ui-status" class="status-badge bg-wait">CONNECTING TO API...</div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <div class="lbl">Win Rate</div>
            <span id="st-wr" style="color:var(--neon)">0%</span>
            <div class="neural-link" id="st-link">0 Active</div>
        </div>
        <div class="stat-box"><div class="lbl">Total Wins</div><span id="st-w" style="color:var(--grn)">0</span></div>
        <div class="stat-box"><div class="lbl">Max Win Streak</div><span id="st-mw" style="color:var(--grn)">0</span></div>
        <div class="stat-box"><div class="lbl">Max Loss Streak</div><span id="st-ml" style="color:var(--red)">0</span></div>
    </div>

    <div class="history-wrap">
        <table class="history-table">
            <thead><tr><th>Issue</th><th>Neural Pts</th><th>Bet</th><th>Result</th><th>Status</th></tr></thead>
            <tbody id="history"></tbody>
        </table>
    </div>

    <script>
        // Settings & Storage
        let isSkipMode = localStorage.getItem('isSkipMode') !== 'false';
        let isInverseMode = localStorage.getItem('isInverseMode') !== 'false';
        let soundEnabled = false;
        let isFetching = false;
        
        let activePrediction = null; 
        let s = { w: 0, l: 0, cw: 0, mw: 0, cl: 0, ml: 0 };
        
        let globalNums = [];
        let globalSizes =[];
        let processedIssues = new Set();

        // --- THE NEURAL BRAIN ---
        // 85 Engines. Weight starts at 1. Max weight 5. Min weight 0 (dead engine).
        let engineWeights = Array(85).fill(1);
        let lastEnginePreds = Array(85).fill(null);
        let activeWeightSum = 85;

        const engGrid = document.getElementById("ui-engines");
        for(let i=0; i<85; i++) {
            let div = document.createElement("div");
            div.className = "engine-led";
            div.id = `led-${i}`;
            engGrid.appendChild(div);
        }

        function initSettings() {
            document.getElementById('btn-safe').className = isSkipMode ? "btn-action active-safe" : "btn-action";
            document.getElementById('btn-action').className = !isSkipMode ? "btn-action active-action" : "btn-action";
            document.getElementById('btn-inv').className = isInverseMode ? "btn-action active-inv" : "btn-action";
            document.getElementById('btn-norm').className = !isInverseMode ? "btn-action active-norm" : "btn-action";
            document.querySelector('.dot').style.background = isInverseMode ? "var(--mirage)" : "var(--neon)";
            document.querySelector('.dot').style.boxShadow = isInverseMode ? "0 0 10px var(--mirage)" : "0 0 10px var(--neon)";
        }

        function setMode(safe) { isSkipMode = safe; localStorage.setItem('isSkipMode', safe); resetStats(); }
        function setInverse(inv) { isInverseMode = inv; localStorage.setItem('isInverseMode', inv); resetStats(); }

        function resetStats() {
            s = { w: 0, l: 0, cw: 0, mw: 0, cl: 0, ml: 0 };
            document.getElementById("history").innerHTML = "";
            engineWeights = Array(85).fill(1); // Reset brain on mode change
            updStats();
            initSettings();
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundBtn');
            if (soundEnabled) { btn.innerHTML = "🔊 Sound On"; btn.className = "btn-sound on"; playBeep(true); } 
            else { btn.innerHTML = "🔇 Sound Off"; btn.className = "btn-sound off"; }
        }

        function playBeep(silent = false) {
            if (!soundEnabled) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (silent) { const osc = ctx.createOscillator(); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.01); return; }
                for (let i = 0; i < 2; i++) {
                    setTimeout(() => {
                        const osc = ctx.createOscillator(); const gain = ctx.createGain();
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.frequency.value = 950; osc.type = "sine";
                        gain.gain.setValueAtTime(0.5, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.1);
                    }, i * 150);
                }
            } catch (e) {}
        }

        async function fetchHistoryData(isInitial = false) {
            if (isFetching) return;
            isFetching = true;
            const ts = Date.now();
            const url = `https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json?ts=${ts}`;

            try {
                const response = await fetch(url, { method: "GET", headers: { "Accept": "application/json" } });
                const data = await response.json();
                processData(data.data.list, isInitial);
            } catch (error) { 
                document.getElementById("ui-status").innerText = "⚠️ API ERROR";
            } finally {
                isFetching = false;
            }
        }

        function processData(list, isInitial) {
            if (!list || list.length < 6) return;

            let currentRound = list[0];
            let issueStr = currentRound.issueNumber;
            let shortIssue = issueStr.slice(-5);
            let actualNum = parseInt(currentRound.number);
            let actualSize = actualNum < 5 ? "S" : "B";

            if (processedIssues.has(issueStr)) return;

            // Update Global Arrays
            for (let i = list.length - 1; i >= 0; i--) {
                let iss = list[i].issueNumber;
                if (!processedIssues.has(iss)) {
                    processedIssues.add(iss);
                    let n = parseInt(list[i].number);
                    globalNums.unshift(n);
                    globalSizes.unshift(n < 5 ? 'S' : 'B');
                }
            }
            if(globalNums.length > 200) { globalNums.length = 200; globalSizes.length = 200; }

            // --- NEURAL FEEDBACK LOOP ---
            if (!isInitial && activePrediction && activePrediction.issue === shortIssue) {
                activeWeightSum = 0;
                let activeCount = 0;

                // Adjust the weight of every single engine based on if it was right or wrong
                for(let i=0; i<85; i++) {
                    if (lastEnginePreds[i] !== null) {
                        if (lastEnginePreds[i] === actualSize) {
                            // Engine was right. Increase trust up to 5.
                            engineWeights[i] = Math.min(engineWeights[i] + 1, 5);
                        } else {
                            // Engine was wrong. Drop trust quickly.
                            engineWeights[i] = Math.max(engineWeights[i] - 1, 0);
                        }
                    }
                    activeWeightSum += engineWeights[i];
                    if (engineWeights[i] > 0) activeCount++;
                }
                document.getElementById("st-link").innerText = `${activeCount} Active`;

                // Handle overall bet result
                let p = activePrediction.target;
                let stat = "-";
                if (p !== "SKIP") {
                    if (p.charAt(0) === actualSize) {
                        s.w++; s.cw++; s.cl = 0; if(s.cw > s.mw) s.mw = s.cw;
                        stat = `<span class="b-win">WIN</span>`;
                    } else {
                        s.l++; s.cl++; s.cw = 0; if(s.cl > s.ml) s.ml = s.cl;
                        stat = `<span class="b-loss">LOSS</span>`;
                    }
                } else {
                    stat = `<span class="b-skip">SKIPPED</span>`;
                }
                
                addTr(shortIssue, activePrediction.voteStr, p, actualSize==='B'?"Big":"Small", stat);
                updStats();
            } else if (!isInitial && !activePrediction) {
                addTr(shortIssue, "--", "SKIP", actualSize==='B'?"Big":"Small", `<span class="b-skip">SKIPPED</span>`);
            }

            // --- GENERATE NEW PREDICTIONS ---
            let nextIssue = (BigInt(issueStr) + 1n).toString().slice(-5);
            let n = globalNums, z = globalSizes;
            let n1=n[0], n2=n[1], n3=n[2], n4=n[3];
            let s1=z[0], s2=z[1], s3=z[2];

            let votes = { B: 0, S: 0 };
            let engRes =[];
            let eIdx = 0;

            // Neural Vote Function: Applies the engine's dynamic weight to the total score
            function vote(v) { 
                let weight = engineWeights[eIdx];
                if(v === 'B') votes.B += weight; 
                else votes.S += weight; 
                
                engRes.push({ val: v, w: weight }); 
                lastEnginePreds[eIdx] = v; // Save for next round feedback
                eIdx++;
            }

            function getNG(d) {
                let pat = z.slice(0, d).join('');
                for(let i=1; i < z.length - d; i++) {
                    if(z.slice(i, i+d).join('') === pat) return z[i-1];
                }
                return z[0];
            }

            // Execute 85 Engines (Same logic, but now dynamically weighted)
            for(let i=0; i<10; i++) vote(z[i] || z[0]);[3, 5, 7, 10, 15, 20, 25, 30, 40, 50].forEach(k => { vote(z.slice(0,k).filter(x=>x==='B').length > k/2 ? 'S' : 'B'); });
            for(let d=2; d<=11; d++) vote(getNG(d));
            
            vote(((n1^n2)%10)<5?'S':'B'); vote(((n1^n2^n3)%10)<5?'S':'B'); vote(((n1^n2^n3^n4)%10)<5?'S':'B');
            vote(((n1+n2)%10)<5?'S':'B'); vote((Math.abs(n1-n2))<5?'S':'B'); vote(((n1*n2)%10)<5?'S':'B');
            vote(Math.round((n1+n2)/2)<5?'S':'B'); vote(((n1+n2+n3)%10)<5?'S':'B'); vote(((n1*3+n2)%10)<5?'S':'B');
            vote(Math.floor(n1*1.618)%10<5?'S':'B'); vote((n1+n2)%7<4?'S':'B'); vote(((n1<<1)%10)<5?'S':'B');
            vote((9-n1)<5?'S':'B'); vote(n1>n2?'B':'S'); vote(n2>n3?'B':'S');
            
            vote(n1%2===0?'S':'B'); vote((n1+n2)%2===0?'S':'B'); vote(s1!==s2?s1:(s1==='B'?'S':'B'));
            vote(s1===s2?(s1==='B'?'S':'B'):s1); vote([0,1,8,9].includes(n1)?(s1==='B'?'S':'B'):s1);
            vote([0,5].includes(n1)||[0,5].includes(n2)?'S':'B'); vote(s1===s2 && s2===s3 ? (s1==='B'?'S':'B') : s1); 
            vote(n1===n2?(s1==='B'?'S':'B'):s1); vote(s1!==s2 && s2!==s3 ? (s1==='B'?'S':'B') : s1); 
            vote(z.filter(x=>x==='B').length > z.length/2 ? 'S' : 'B');

            for(let i=1; i<=30; i++) { vote(((n1*i + n2*(i+1) + n3) % 10) < 5 ? 'S' : 'B'); }

            // UI Update: Dim engines that have 0 weight
            for(let i=0; i<85; i++) {
                let l = document.getElementById(`led-${i}`);
                if (l) {
                    if (engRes[i].w === 0) l.className = `engine-led led-dead`;
                    else l.className = `engine-led led-${engRes[i].val}`;
                }
            }

            // --- NEURAL CONSENSUS LOGIC ---
            let crowdConsensus = "SKIP";
            let msg = "";
            let pClass = "matrix-panel wait";
            let sClass = "status-badge bg-wait";

            // Threshold is 60% of ACTIVE points, not absolute engines
            let threshold = activeWeightSum * 0.6; 

            if (isSkipMode) {
                if (votes.B >= threshold) crowdConsensus = "Big";
                else if (votes.S >= threshold) crowdConsensus = "Small";
            } else {
                if (votes.B > votes.S) crowdConsensus = "Big";
                else crowdConsensus = "Small";
            }

            // INVERSION
            let finalPred = "SKIP";
            if (crowdConsensus !== "SKIP") {
                if (isInverseMode) {
                    finalPred = crowdConsensus === "Big" ? "Small" : "Big";
                    msg = `⚡ INVERTED NEURAL NET! Bet ${finalPred.toUpperCase()}`;
                    pClass = "matrix-panel active-inv";
                    sClass = "status-badge bg-inv";
                } else {
                    finalPred = crowdConsensus;
                    msg = `✅ FOLLOWING NEURAL NET! Bet ${finalPred.toUpperCase()}`;
                    pClass = "matrix-panel active-norm";
                    sClass = "status-badge bg-norm";
                }
            } else {
                msg = `NEURAL CONFLICT. SKIPPING. B:${votes.B} S:${votes.S}`;
            }

            activePrediction = { issue: nextIssue, target: finalPred, voteStr: `${votes.B} - ${votes.S}` };
            updateUI(nextIssue, finalPred, msg, pClass, sClass);

            if (!isInitial && finalPred !== "SKIP") playBeep();
        }

        function updateUI(issue, pred, msg, pClass, sClass) {
            document.getElementById("ui-issue").innerText = issue;
            document.getElementById("panel").className = pClass;
            document.getElementById("ui-status").className = sClass;
            document.getElementById("ui-status").innerText = msg;

            let tEl = document.getElementById("ui-target");
            if (pred === "SKIP") { tEl.innerText = "DO NOT BET"; tEl.className = "target-text Wait"; } 
            else { tEl.innerText = pred; tEl.className = `target-text ${pred}`; }
        }

        function addTr(issue, pts, pred, res, stat) {
            let tb = document.getElementById("history");
            let tr = document.createElement("tr");
            let pColor = pred === "Big" ? "var(--warn)" : (pred === "Small" ? "var(--pri)" : "var(--mut)");
            let rColor = res === "Big" ? "var(--warn)" : "var(--pri)";
            
            tr.innerHTML = `
                <td>${issue}</td>
                <td style="font-size:0.7rem; color:var(--mut)">${pts} pts</td>
                <td style="color:${pColor}; font-weight:bold; text-transform:uppercase">${pred==="SKIP"?"-":pred}</td>
                <td style="color:${rColor}; font-weight:bold">${res}</td>
                <td>${stat}</td>
            `;
            tb.prepend(tr);
        }

        function updStats() {
            let tot = s.w + s.l;
            let wr = tot === 0 ? 0 : Math.round((s.w/tot)*100);
            document.getElementById("st-wr").innerText = `${wr}%`;
            document.getElementById("st-w").innerText = s.w;
            document.getElementById("st-mw").innerText = s.mw;
            document.getElementById("st-ml").innerText = s.ml;
        }

        setInterval(() => {
            const sec = new Date().getSeconds();
            let rem = sec < 30 ? 30 - sec : 60 - sec;
            document.getElementById("ui-timer").innerText = rem.toString().padStart(2, '0') + "s";
            if (sec === 1 || sec === 31) fetchHistoryData();
        }, 1000);

        window.onload = () => { initSettings(); fetchHistoryData(true); };
    </script>
</body>
</html>
